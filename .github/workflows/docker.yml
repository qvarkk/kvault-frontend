name: Build and push Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: gitverse.ru
          username: ${{ secrets.GITVERSE_USERNAME }}
          password: ${{ secrets.GITVERSE_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/qvarkk/kvault-frontend:latest
            gitverse.ru/qvarkk/kvault-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
